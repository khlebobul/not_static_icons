<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="not_static_icons_app">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>not_static_icons</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="loader" class="loader-container">
    <div class="loading-text" id="loading-text">loading...</div>

    <div class="progress-wrapper">
      <div class="progress-container">
        <div class="progress-bar" id="progress-bar"></div>
      </div>
    </div>
  </div>

  <script src="flutter.js" defer></script>
  <script>
    (function() {
      var bar = document.getElementById('progress-bar');
      var loader = document.getElementById('loader');
      var loadingText = document.getElementById('loading-text');
      var currentProgress = 0;
      var targetProgress = 0;

      function animateProgress() {
        var diff = targetProgress - currentProgress;
        if (Math.abs(diff) > 0.5) {
          currentProgress += diff * 0.1;
          if (bar) bar.style.width = currentProgress + '%';
          requestAnimationFrame(animateProgress);
        } else {
          currentProgress = targetProgress;
          if (bar) bar.style.width = currentProgress + '%';
        }
      }

      function setProgress(pct) {
        targetProgress = pct;
        requestAnimationFrame(animateProgress);
      }

      function setText(text) {
        if (loadingText) loadingText.textContent = text;
      }

      function hideLoader() {
        if (loader) loader.classList.add('loader-hidden');
      }

      function startLoading() {
        setProgress(10);
        setText('loading...');

        _flutter.loader.loadEntrypoint({
          onEntrypointLoaded: function(engineInitializer) {
            setProgress(35);
            setText('initializing engine...');

            engineInitializer.initializeEngine().then(function(appRunner) {
              setProgress(65);
              setText('preparing app...');

              appRunner.runApp();
              
              // Ensure we show 100% and hide loader
              setTimeout(function() {
                setProgress(100);
                setText('ready');
                setTimeout(hideLoader, 300);
              }, 100);
            });
          }
        });
      }

      // Wait for flutter.js to load
      if (window._flutter) {
        startLoading();
      } else {
        var checkFlutter = setInterval(function() {
          if (window._flutter) {
            clearInterval(checkFlutter);
            startLoading();
          }
        }, 50);

        // Fallback timeout
        setTimeout(function() {
          clearInterval(checkFlutter);
          if (!window._flutter) {
            setText('error loading');
          }
        }, 10000);
      }
    })();
  </script>
</body>
</html>
